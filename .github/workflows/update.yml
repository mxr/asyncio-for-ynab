name: Update

on:
  workflow_dispatch:
  schedule:
  - cron: 5 0 * * *     # every day at 00:05 UTC

permissions: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: Download upstream spec
      id: download
      env:
        # Pin of api.ynab.com's SubjectPublicKeyInfo, generated via:
        #   openssl s_client -connect api.ynab.com:443 </dev/null 2>/dev/null |
        #   openssl x509 -pubkey -noout |
        #   openssl pkey -pubin -outform der |
        #   openssl dgst -sha256 -binary | base64
        YNAB_API_PUBKEY_PIN: ${{ vars.YNAB_API_PUBKEY_PIN }}
      run: |
        tmp="$(mktemp)"
        trap 'rm -f "$tmp"' EXIT

        curl \
          --fail \
          --location \
          --noproxy '*' \
          --pinnedpubkey sha256//"$YNAB_API_PUBKEY_PIN" \
          --show-error \
          --silent \
          --tlsv1.2 \
          "https://api.ynab.com/papi/open_api_spec.yaml" \
          --output "$tmp"

        if cmp -s config/spec.yaml "$tmp"; then
          echo "YNAB spec is already current."
          echo "CHANGED=false" >> "$GITHUB_ENV"
          exit 0
        fi

        mv "$tmp" config/spec.yaml
        trap - EXIT
        echo "CHANGED=true" >> "$GITHUB_ENV"

    - name: Sync generator version
      if: env.CHANGED == 'true'
      run: |
        version="$(sed -n 's/^  version: //p' config/spec.yaml | head -n 1)"

        if [ -z "$version" ]; then
          echo "could not read info.version from config/spec.yaml" >&2
          exit 1
        fi

        tmp="$(mktemp)"
        trap 'rm -f "$tmp"' EXIT
        sed "s/^packageVersion: .*/packageVersion: $version/" config/openapi.yaml > "$tmp"
        mv "$tmp" config/openapi.yaml
        trap - EXIT
        echo "SPEC_VERSION=$version" >> "$GITHUB_ENV"

    - name: Determine revision
      if: env.CHANGED == 'true'
      run: |
        base_title="Update YNAB API spec to v$SPEC_VERSION"
        pattern="^${base_title}( \(revision [0-9]+\))?"

        # Count prior commits on this branch that updated to the same spec
        # version, so a same-version doc-only re-sync gets a distinguishing
        # "(revision N)" suffix instead of an identical, confusing title.
        count="$(git log --oneline --grep="$pattern" --extended-regexp | wc -l | tr -d ' ')"

        if [ "$count" -eq 0 ]; then
          echo "SPEC_TITLE=$base_title" >> "$GITHUB_ENV"
        else
          echo "SPEC_TITLE=$base_title (revision $((count + 1)))" >> "$GITHUB_ENV"
        fi
      env:
        SPEC_VERSION: ${{ env.SPEC_VERSION }}

    - name: Create pull request
      if: env.CHANGED == 'true'
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1   # v8.1.1
      env:
        SPEC_TITLE: ${{ env.SPEC_TITLE }}
      with:
        branch: update-ynab-spec
        title: ${{ env.SPEC_TITLE }}
        commit-message: ${{ env.SPEC_TITLE }}
        body: ''
