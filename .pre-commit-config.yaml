# these are generated
exclude: |
  (?x)^(
      asyncio_for_ynab/.+|
      docs/.+|
      test/.+
  )$

repos:
- repo: https://github.com/mxr/mirrors-openapi-generator-cli
  rev: 4f81b48989ed7c5f76cfd37a07320dd0eb2e2d16  # frozen: v7.23.0
  hooks:
  - id: openapi-generator-cli
    alias: openapi-validate
    name: validate OpenAPI spec
    args: [validate, -i, config/spec.yaml]
    pass_filenames: false
    files: |
      (?x)^(
          config/.*\.ya?ml
      )$

  - id: openapi-generator-cli
    alias: openapi-generate
    name: generate async YNAB SDK
    args: [generate, -i, config/spec.yaml, -g, python, -c, config/openapi.yaml, -t, templates/python, -o, ., --minimal-update]
    pass_filenames: false
    files: |
      (?x)^(
          config/.*\.ya?ml|
          templates/python/.*\.mustache
      )$
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-docstring-first
  - id: debug-statements
  - id: end-of-file-fixer
  - id: pretty-format-json
    args: [--autofix, --indent=2]
  - id: trailing-whitespace
    exclude: config/spec.yaml
- repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
  rev: 4380fbb73a154b5f5624794c1c78d9719ccc860f  # frozen: v2.16.0
  hooks:
  - id: pretty-format-toml
    args: [--autofix, --trailing-commas]
  - id: pretty-format-yaml
    args: [--autofix]
    exclude: config/spec.yaml
- repo: https://github.com/asottile/reorder-python-imports
  rev: 5e38415c12154247a099c7023c210e3d458275b5  # frozen: v3.17.0
  hooks:
  - id: reorder-python-imports
    args: [--py310-plus, --add-import, from __future__ import annotations]
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 2700fd5671c633760d912769c041bfcde2b9a01b  # frozen: v0.15.22
  hooks:
  - id: ruff-check
    args: [--fix]
  - id: ruff-format
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: 41e691678310dfd3833f7ab4e180ddb014310356  # frozen: v2.3.0
  hooks:
  - id: mypy
    language_version: python3.10
    additional_dependencies:
    - aioresponses
    - coverage
    - httpx>=0.28.1
    - pydantic>=2.11
    - pytest
    - pytest-asyncio
    - python-dateutil>=2.8.2
    - setuptools
    - typing-extensions>=4.7.1
- repo: https://github.com/mxr/mirrors-ty
  rev: febed8a7b2665e80a9d3855c59ac716a6284d628  # frozen: v0.0.61
  hooks:
  - id: ty
    additional_dependencies:
    - aioresponses
    - coverage
    - httpx>=0.28.1
    - pydantic>=2.11
    - pytest
    - pytest-asyncio
    - python-dateutil>=2.8.2
    - setuptools
    - typing-extensions>=4.7.1
    language_version: python3.10
- repo: https://github.com/mxr/sync-typing-deps
  rev: c2ec0c01a31703615c17e3fe11d1fe28c003f1d8  # frozen: v0.5.3
  hooks:
  - id: sync-typing-deps
- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: 64a97fb7fa63188393d3215c6e312f5f9c6d0f78  # frozen: v1.27.0
  hooks:
  - id: zizmor
    args: [--no-progress, --fix]
- repo: https://github.com/rhysd/actionlint
  rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # frozen: v1.7.12
  hooks:
  - id: actionlint
    additional_dependencies:
    - github.com/wasilibs/go-shellcheck/cmd/shellcheck@latest
