[build-system]
build-backend = "setuptools.build_meta"
requires = ["setuptools"]

[dependency-groups]
dev = [
  "aioresponses",
  "covdefaults>=2.1.0",
  "coverage",
  "pytest",
  "pytest-asyncio",
]

[project]
authors = [{name = "Max R", email = "mxr@users.noreply.github.com"}]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: Implementation :: CPython",
]
dependencies = [
  "httpx>=0.28.1",
  "pydantic>=2.11",
  "python-dateutil>=2.8.2",
  "typing-extensions>=4.7.1",
]
description = "Unofficial asyncio client for the YNAB API."
keywords = ["ynab", "budget", "asyncio", "openapi", "httpx"]
license = "MIT"
name = "asyncio_for_ynab"
readme = "README.md"
requires-python = ">=3.10"
version = "1.86.0"

[project.urls]
Homepage = "https://github.com/mxr/asyncio-for-ynab"

[tool.coverage.run]
plugins = ["covdefaults"]

[tool.mypy]
check_untyped_defs = true
disallow_any_generics = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
# autogenerated code is known to have errors
ignore_errors = true
module = ["asyncio_for_ynab.*", "test.*"]

[[tool.mypy.overrides]]
disallow_untyped_defs = false
module = "test_custom.*"

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
asyncio_default_fixture_loop_scope = "function"

[tool.ruff]
line-length = 150
target-version = "py310"

[tool.ruff.lint]
extend-select = [
  "UP",  # see pyupgrade
  "B",  # see flake8-bugbear
  "A",  # see flake8-builtins
  "C4",  # see flake8-comprehension
  "SIM",  # see flake8-simplify
  "TC",  # see flake8-type-checking
]

[tool.setuptools.package-data]
asyncio_for_ynab = ["py.typed"]

[tool.setuptools.packages]
find = {}

[tool.tox]
env_list = ["py310", "py311", "py312", "py313", "py314", "pre-commit"]

[tool.tox.env.pre-commit]
commands = [["pre-commit", "run", "--all-files", "--show-diff-on-failure"]]
deps = ["pre-commit"]
skip_install = true

[tool.tox.env_run_base]
commands = [
  ["coverage", "erase"],
  ["coverage", "run", "-m", "pytest", "test", "test_custom"],
  ["coverage", "report"],
]
dependency_groups = ["dev"]

[tool.ty.rules]
all = "error"

[tool.ty.src]
# autogenerated code is known to have errors
exclude = ["asyncio_for_ynab/**", "test/**"]
